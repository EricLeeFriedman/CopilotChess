name: Feature
description: Capture a design-and-implementation task for the chess application.
title: "[Feature]: "
labels:
  - feature
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the outcome this task should deliver.
    validations:
      required: true
  - type: textarea
    id: player_behavior
    attributes:
      label: Player-facing behavior
      description: Explain what a player should be able to do or observe when this task is complete.
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints touched
      options:
        - label: Win32 platform boundary
        - label: 2D software rendering
        - label: Chess rules or move legality
        - label: Mouse input or drag-and-drop
        - label: Memory arenas or allocation policy
        - label: In-application testing
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Write the specific conditions that must be true for this task to be done.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation expectations
      description: Describe the test mode, manual checks, or observable evidence expected for completion.
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Documentation impact
      description: Note which repository docs should be updated or confirmed.
