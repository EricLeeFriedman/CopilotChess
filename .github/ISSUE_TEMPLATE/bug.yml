name: Bug
description: Capture a defect with enough detail for an agent to reproduce and fix it.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the defect.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide deterministic steps, including test mode details if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Affected rules or systems
      description: Note the likely subsystem, such as move generation, rendering, input, restart flow, or test mode.
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include logs, screenshots, or test-mode output when available.
