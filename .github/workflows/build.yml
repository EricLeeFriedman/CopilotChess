name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        shell: pwsh
        run: .\build.ps1

      - name: Test
        shell: pwsh
        run: .\build\chess.exe --test
