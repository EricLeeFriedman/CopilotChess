name: Retrospective Analysis

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to analyze'
        required: true
        type: string
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  retrospective:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Resolve PR number
        id: resolve_pr
        env:
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
          PR_NUMBER_EVENT: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "${PR_NUMBER_INPUT}" ]; then
            echo "pr_number=${PR_NUMBER_INPUT}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${PR_NUMBER_EVENT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check automated review round count
        id: check_rounds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
          MANUAL_TRIGGER: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import urllib.request

          GITHUB_API = "https://api.github.com"
          AUTO_TRIGGER_THRESHOLD = 3

          token = os.environ["GITHUB_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          manual_trigger = os.environ.get("MANUAL_TRIGGER", "false") == "true"

          def gh_get_paged(path):
              results = []
              page = 1
              while True:
                  sep = "&" if "?" in path else "?"
                  req = urllib.request.Request(
                      f"{GITHUB_API}{path}{sep}per_page=100&page={page}",
                      headers={
                          "Authorization": f"Bearer {token}",
                          "Accept": "application/vnd.github+json",
                          "X-GitHub-Api-Version": "2022-11-28",
                      },
                  )
                  with urllib.request.urlopen(req) as response:
                      page_data = json.loads(response.read())
                  if not page_data:
                      break
                  results.extend(page_data)
                  if len(page_data) < 100:
                      break
                  page += 1
              return results

          reviews = gh_get_paged(f"/repos/{repo}/pulls/{pr_number}/reviews")
          automated_count = sum(
              1 for r in reviews
              if r.get("state") == "CHANGES_REQUESTED"
              and r.get("user", {}).get("login") == "github-actions[bot]"
          )

          print(f"Automated blocking review count: {automated_count}")

          github_output = os.environ.get("GITHUB_OUTPUT", "")
          if github_output:
              with open(github_output, "a") as f:
                  f.write(f"round_count={automated_count}\n")
                  if manual_trigger or automated_count >= AUTO_TRIGGER_THRESHOLD:
                      f.write("run_retro=true\n")
                  else:
                      f.write("run_retro=false\n")
              if not (manual_trigger or automated_count >= AUTO_TRIGGER_THRESHOLD):
                  print(
                      f"Skipping retrospective: {automated_count} automated blocking review(s) "
                      f"< threshold {AUTO_TRIGGER_THRESHOLD}. "
                      "Use workflow_dispatch to run a retrospective on any PR regardless of round count."
                  )
          PYEOF

      - name: Collect retrospective data
        if: steps.check_rounds.outputs.run_retro == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import urllib.request

          GITHUB_API = "https://api.github.com"
          DIFF_MAX_CHARS = 20000

          token = os.environ["GITHUB_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]

          def gh_get(path, accept="application/vnd.github+json"):
              req = urllib.request.Request(
                  f"{GITHUB_API}{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": accept,
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return response.read()

          def gh_get_paged(path):
              results = []
              page = 1
              while True:
                  sep = "&" if "?" in path else "?"
                  req = urllib.request.Request(
                      f"{GITHUB_API}{path}{sep}per_page=100&page={page}",
                      headers={
                          "Authorization": f"Bearer {token}",
                          "Accept": "application/vnd.github+json",
                          "X-GitHub-Api-Version": "2022-11-28",
                      },
                  )
                  with urllib.request.urlopen(req) as response:
                      page_data = json.loads(response.read())
                  if not page_data:
                      break
                  results.extend(page_data)
                  if len(page_data) < 100:
                      break
                  page += 1
              return results

          pr_data = json.loads(gh_get(f"/repos/{repo}/pulls/{pr_number}"))
          reviews = gh_get_paged(f"/repos/{repo}/pulls/{pr_number}/reviews")
          issue_comments = gh_get_paged(f"/repos/{repo}/issues/{pr_number}/comments")
          review_comments = gh_get_paged(f"/repos/{repo}/pulls/{pr_number}/comments")
          commits = gh_get_paged(f"/repos/{repo}/pulls/{pr_number}/commits")
          diff_raw = gh_get(
              f"/repos/{repo}/pulls/{pr_number}",
              accept="application/vnd.github.diff",
          ).decode("utf-8", errors="replace")

          lines = []
          lines.append(f"# Retrospective Input: PR #{pr_number}")
          lines.append("")
          lines.append("## PR Metadata")
          lines.append(f"- **Title:** {pr_data.get('title', '')}")
          lines.append(f"- **Author:** {pr_data.get('user', {}).get('login', '')}")
          lines.append(f"- **State:** {pr_data.get('state', '')}")
          lines.append(f"- **Merged:** {pr_data.get('merged', False)}")
          lines.append(f"- **Created:** {pr_data.get('created_at', '')}")
          lines.append(f"- **Closed/Merged at:** {pr_data.get('closed_at', '')}")
          lines.append(f"- **Base branch:** {pr_data.get('base', {}).get('ref', '')}")
          lines.append(f"- **Head branch:** {pr_data.get('head', {}).get('ref', '')}")
          lines.append(f"- **Changed files:** {pr_data.get('changed_files', 0)}")
          lines.append(f"- **Total commits:** {pr_data.get('commits', 0)}")
          lines.append("")
          lines.append("### PR Description")
          lines.append(pr_data.get("body") or "(no description)")
          lines.append("")
          lines.append("## Commit History")
          for c in commits:
              sha = c.get("sha", "")[:8]
              msg = (c.get("commit", {}).get("message") or "").split("\n")[0]
              author = c.get("commit", {}).get("author", {}).get("name", "")
              date = c.get("commit", {}).get("author", {}).get("date", "")
              lines.append(f"- `{sha}` {date[:10]} {author}: {msg}")
          lines.append("")
          lines.append("## Review History")
          for r in reviews:
              state = r.get("state", "")
              user = r.get("user", {}).get("login", "")
              submitted = r.get("submitted_at", "")
              body = (r.get("body") or "").strip()
              lines.append(f"### Review by {user} — {state} ({submitted})")
              if body:
                  lines.append(body)
              lines.append("")
          lines.append("## Issue Comments (Timeline)")
          for c in issue_comments:
              user = c.get("user", {}).get("login", "")
              created = c.get("created_at", "")
              body = (c.get("body") or "").strip()
              lines.append(f"### Comment by {user} ({created})")
              lines.append(body)
              lines.append("")
          lines.append("## Inline Review Comments")
          for c in review_comments:
              user = c.get("user", {}).get("login", "")
              path = c.get("path", "")
              line = c.get("line") or c.get("original_line", "")
              body = (c.get("body") or "").strip()
              created = c.get("created_at", "")
              lines.append(f"### Inline comment by {user} on `{path}`:{line} ({created})")
              lines.append(body)
              lines.append("")
          lines.append("## Pull Request Diff")
          lines.append("```diff")
          if len(diff_raw) > DIFF_MAX_CHARS:
              lines.append(diff_raw[:DIFF_MAX_CHARS])
              lines.append(f"... (diff truncated at {DIFF_MAX_CHARS} chars)")
          else:
              lines.append(diff_raw)
          lines.append("```")

          with open("retro-input.md", "w", encoding="utf-8", newline="\n") as fh:
              fh.write("\n".join(lines))
          print(f"Wrote retro-input.md ({len(lines)} sections)")
          PYEOF

      - name: Run retrospective agent
        if: steps.check_rounds.outputs.run_retro == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_REVIEW_TOKEN || secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          if [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo "Missing Copilot CLI auth secret. Add either COPILOT_REVIEW_TOKEN or PERSONAL_ACCESS_TOKEN as a repository secret." >&2
            echo "The value must be a fine-grained PAT for a GitHub user with Copilot access, and it must include the 'Copilot Requests' permission." >&2
            exit 1
          fi

          cat << 'EOF' > retro-prompt.txt
          Perform a retrospective analysis of the pull request described in `retro-input.md`.

          Use the repository's `retrospective` custom agent behavior and inspect repository files as needed.

          Read `retro-input.md` first, then read the following repository files to understand the system context:
          - `AGENTS.md`
          - `.github/copilot-instructions.md`
          - `docs/workflow.md`
          - `docs/build-and-runner.md`
          - `.github/workflows/pr-review.yml`
          - `.github/agents/cpp-pr-review.agent.md`

          Output your retrospective analysis as Markdown suitable for a GitHub issue comment. Do not include markdown fences around the entire output.
          EOF

          cat retro-prompt.txt | copilot --agent=retrospective -s --no-ask-user --add-dir="$PWD" > retro-output.txt

      - name: Post retrospective comment
        if: steps.check_rounds.outputs.run_retro == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
          ROUND_COUNT: ${{ steps.check_rounds.outputs.round_count }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import re
          import urllib.request

          GITHUB_API = "https://api.github.com"
          RETRO_SENTINEL = "## Retrospective Analysis"

          token = os.environ["GITHUB_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          round_count = os.environ.get("ROUND_COUNT", "0")

          retro_output = open("retro-output.txt", encoding="utf-8").read()
          retro_output = re.sub(r"\x1b\[[0-9;?]*[ -/]*[@-~]", "", retro_output).strip()
          if not retro_output:
              retro_output = "(Retrospective agent produced no output.)"

          # Check if a retrospective comment was already posted to avoid duplicates.
          page = 1
          already_posted = False
          while True:
              req = urllib.request.Request(
                  f"{GITHUB_API}/repos/{repo}/issues/{pr_number}/comments?per_page=100&page={page}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req) as response:
                  comments = json.loads(response.read())
              if any(RETRO_SENTINEL in (c.get("body") or "") for c in comments):
                  already_posted = True
                  break
              if len(comments) < 100:
                  break
              page += 1

          if already_posted:
              print("Retrospective comment already posted; skipping duplicate.")
          else:
              trigger_note = (
                  f"_Triggered manually on PR #{pr_number}._"
                  if round_count == "0"
                  else f"_Triggered after {round_count} automated blocking review round(s)._"
              )
              body = f"{RETRO_SENTINEL}\n\n{trigger_note}\n\n{retro_output}"
              payload = json.dumps({"body": body}).encode()
              req = urllib.request.Request(
                  f"{GITHUB_API}/repos/{repo}/issues/{pr_number}/comments",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req) as response:
                  result = json.loads(response.read())
              print(f"Posted retrospective comment {result.get('id')}.")
          PYEOF
