name: PR Adversarial Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'build.ps1'
      - 'docs/**'
      - '.github/agents/**'
      - '.github/workflows/pr-review.yml'
      - 'AGENTS.md'
      - 'README.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Check review round count
        id: check_rounds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import urllib.request

          GITHUB_API = "https://api.github.com"
          MAX_ROUNDS = 7

          token = os.environ["GITHUB_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]

          def gh_get(path):
              req = urllib.request.Request(
                  f"{GITHUB_API}{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read())

          reviews = gh_get(f"/repos/{repo}/pulls/{pr_number}/reviews")
          automated_count = sum(
              1 for r in reviews
              if isinstance(r.get("body"), str) and r["body"].startswith("@copilot")
          )
          print(f"Automated review count: {automated_count}/{MAX_ROUNDS}")

          github_output = os.environ.get("GITHUB_OUTPUT", "")
          if github_output:
              with open(github_output, "a") as f:
                  if automated_count >= MAX_ROUNDS:
                      f.write("skip_review=true\n")
                  else:
                      f.write("skip_review=false\n")
                  f.write(f"round_count={automated_count}\n")
          PYEOF

      - name: Post round limit message
        if: steps.check_rounds.outputs.skip_review == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          ROUND_COUNT: ${{ steps.check_rounds.outputs.round_count }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import urllib.request

          GITHUB_API = "https://api.github.com"

          token = os.environ["GITHUB_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          round_count = os.environ.get("ROUND_COUNT", "7")

          body = (
              f"Automated review has reached the maximum of 7 review/response rounds "
              f"({round_count} automated reviews posted) without fully resolving all findings. "
              "**Human intervention is required.** Please review the outstanding findings manually "
              "and address or dismiss them before merging. The automated review/respond cycle has "
              "been stopped for this pull request."
          )

          payload = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              f"{GITHUB_API}/repos/{repo}/issues/{pr_number}/comments",
              data=payload,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          with urllib.request.urlopen(req) as response:
              result = json.loads(response.read())
          print(f"Posted round limit message as comment {result.get('id')}.")
          PYEOF

      - name: Build review input
        if: steps.check_rounds.outputs.skip_review != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, urllib.request

          GITHUB_API = "https://api.github.com"

          token = os.environ["GITHUB_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]

          req = urllib.request.Request(
              f"{GITHUB_API}/repos/{repo}/pulls/{pr_number}",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github.diff",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          with urllib.request.urlopen(req) as response:
              diff_raw = response.read().decode("utf-8", errors="replace")

          if not diff_raw.strip():
              raise SystemExit("Pull request diff is empty.")

          with open("pr.diff", "w", encoding="utf-8", newline="\n") as fh:
              fh.write(diff_raw)
          PYEOF

      - name: Run Copilot review agent
        if: steps.check_rounds.outputs.skip_review != 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_REVIEW_TOKEN || secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          if [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo "Missing Copilot CLI auth secret. Add either COPILOT_REVIEW_TOKEN or PERSONAL_ACCESS_TOKEN as a repository secret." >&2
            echo "The value must be a fine-grained PAT for a GitHub user with Copilot access, and it must include the 'Copilot Requests' permission." >&2
            exit 1
          fi

          cat << 'EOF' > copilot-review-prompt.txt
          Review the pull request diff stored in `pr.diff`.

          Use the repository's `cpp-pr-review` custom agent behavior and inspect repository files as needed.

          Output ONLY valid JSON matching this schema exactly:
          {
            "event": "REQUEST_CHANGES" | "COMMENT" | "APPROVE",
            "body": "@copilot <overall summary>",
            "comments": [
              {
                "path": "<file path relative to repo root>",
                "line": <positive integer — line in the new file visible in the diff>,
                "body": "@copilot <specific finding>"
              }
            ]
          }

          Rules:
          - Every "body" value MUST start with "@copilot ".
          - Use REQUEST_CHANGES when you find real issues.
          - Use APPROVE only when the change is clearly correct and complete.
          - Use COMMENT for observations that do not require a change.
          - Only include inline comments for findings tied to a specific file and line that is present in the diff.
          - The "comments" array may be empty.
          - Do not include markdown fences or any prose before or after the JSON.
          EOF

          cat copilot-review-prompt.txt | copilot --agent=cpp-pr-review -s --no-ask-user --add-dir="$PWD" > copilot-review-output.txt

      - name: Post GitHub review
        if: steps.check_rounds.outputs.skip_review != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import re
          import urllib.error
          import urllib.request

          GITHUB_API = "https://api.github.com"

          token = os.environ["GITHUB_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          head_sha = os.environ["HEAD_SHA"]

          def gh_post(path, data):
              payload = json.dumps(data).encode()
              req = urllib.request.Request(
                  f"{GITHUB_API}{path}",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read())

          def ensure_prefix(text):
              if isinstance(text, str) and text.startswith("@copilot "):
                  return text
              if isinstance(text, str) and text.startswith("@copilot"):
                  return text
              return "@copilot " + (text if isinstance(text, str) else "")

          raw_content = open("copilot-review-output.txt", encoding="utf-8").read()
          cleaned_content = raw_content.replace("\r", "").lstrip("\ufeff")
          cleaned_content = re.sub(r"\x1b\[[0-9;?]*[ -/]*[@-~]", "", cleaned_content).strip()

          if cleaned_content.startswith("```"):
              lines = cleaned_content.splitlines()
              if len(lines) >= 3:
                  cleaned_content = "\n".join(lines[1:-1]).strip()

          try:
              review = json.loads(cleaned_content)
          except json.JSONDecodeError as exc:
              start = cleaned_content.find("{")
              end = cleaned_content.rfind("}")
              if start >= 0 and end > start:
                  candidate = cleaned_content[start:end + 1]
                  try:
                      review = json.loads(candidate)
                  except json.JSONDecodeError:
                      print(f"Copilot CLI response is not valid JSON: {exc}")
                      print(cleaned_content[:1000])
                      review = {
                          "event": "COMMENT",
                          "body": "@copilot Automated review could not parse structured output.",
                          "comments": [],
                      }
              else:
                  print(f"Copilot CLI response is not valid JSON: {exc}")
                  print(cleaned_content[:1000])
                  review = {
                      "event": "COMMENT",
                      "body": "@copilot Automated review could not parse structured output.",
                      "comments": [],
                  }

          review["body"] = ensure_prefix(review.get("body", ""))
          for comment in review.get("comments", []):
              comment["body"] = ensure_prefix(comment.get("body", ""))

          if review.get("event") not in {"REQUEST_CHANGES", "COMMENT", "APPROVE"}:
              review["event"] = "COMMENT"

          if review.get("event") == "APPROVE":
              review["event"] = "COMMENT"
              review["body"] = ensure_prefix(
                  (review.get("body") or "") + "\n\n(Approval converted to COMMENT: Actions cannot approve pull requests.)"
              )

          inline_comments = []
          for comment in review.get("comments", []):
              try:
                  inline_comments.append({
                      "path": str(comment["path"]),
                      "line": int(comment["line"]),
                      "side": "RIGHT",
                      "body": str(comment["body"]),
                  })
              except (KeyError, ValueError, TypeError):
                  pass

          review_payload = {
              "commit_id": head_sha,
              "body": review["body"],
              "event": review["event"],
              "comments": inline_comments,
          }

          try:
              result = gh_post(f"/repos/{repo}/pulls/{pr_number}/reviews", review_payload)
              print(f"Posted review {result.get('id')} with {len(inline_comments)} inline comments.")
          except urllib.error.HTTPError as exc:
              error_body = exc.read().decode()
              print(f"GitHub API error {exc.code}: {error_body}")
              if not inline_comments:
                  raise

              print("Retrying without inline comments.")
              review_payload["comments"] = []
              result = gh_post(f"/repos/{repo}/pulls/{pr_number}/reviews", review_payload)
              print(f"Posted review {result.get('id')} without inline comments.")
          PYEOF

      - name: Ping Copilot to address automated findings
        if: steps.check_rounds.outputs.skip_review != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.error, urllib.request

          token = os.environ["GH_TOKEN"]
          pr = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]

          body = (
            "@copilot Please address the blocking findings from the automated PR review. "
            "After pushing fixes, re-run tests and update docs if required."
          )

          payload = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
            f"https://api.github.com/repos/{repo}/issues/{pr}/comments",
            data=payload,
            headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json",
              "X-GitHub-Api-Version": "2022-11-28",
            },
            method="POST",
          )
          try:
            with urllib.request.urlopen(req) as resp:
              print(resp.status)
          except urllib.error.HTTPError as exc:
            print(f"Ping Copilot failed (HTTP {exc.code}): {exc.read().decode()}")
            print("Ensure PERSONAL_ACCESS_TOKEN has 'issues: write' (or 'repo') permission.")
            raise
          PYEOF
