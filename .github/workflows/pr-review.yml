name: PR Adversarial Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'build.ps1'
      - 'docs/**'
      - '.github/agents/**'
      - '.github/workflows/pr-review.yml'
      - 'AGENTS.md'
      - 'README.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Adversarial Review
        uses: github/copilot-actions@v1
        with:
          agent: .github/agents/cpp-pr-review.agent.md
